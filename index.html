<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة السعرات</title>
<style>
:root{ --bg: linear-gradient(135deg,#74ebd5,#ACB6E5);} 
body{font-family:'Segoe UI';background:var(--bg);margin:0;text-align:center}
.container{max-width:450px;margin:20px auto;background:#fff;padding:18px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.2)}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:10px;background:#4CAF50;color:#fff;cursor:pointer}
.reset{background:#f44336}
.results{display:none;margin-top:15px;padding:15px;border-radius:12px;text-align:right}
canvas{margin-top:10px}
.footer{margin-top:15px;font-size:13px;color:#333}
</style>
</head>
<body>

<div class="container">

<h2 id="title">حاسبة السعرات والاحتياجات</h2>
<div style="margin-left:24px; text-align: center;">
    <input type="text" id="username" placeholder="اسم المستخدم">
</div>
<!-- <div style="margin-left:24px; text-align: center;">
    <input type="file" id="bgInput" accept="image/*">
</div> -->
<div style="margin-left:24px; text-align: center;">
    <input type="number"  id="weight" placeholder="الوزن">

</div>
<div style="margin-left:24px; text-align: center;">
    <input type="number" id="height" placeholder="الطول">
</div>
<div style="margin-left:24px; text-align: center;">
    <input type="number" id="age" placeholder="العمر">
</div>

<select id="gender">
<option value="male">ذكر</option>
<option value="female">أنثى</option>
</select>

<select id="activity">
<option value="1.2">قليل</option>
<option value="1.55">متوسط</option>
<option value="1.9">عالي</option>
</select>

<select id="goal">
<option value="maintain">ثبات</option>
<option value="lose">خسارة</option>
<option value="gain">زيادة</option>
</select>

<button onclick="calc()">احسب</button>
<button class="reset" onclick="resetForm()">Reset</button>
<button onclick="downloadPDF()">تحميل PDF</button>

<div id="results" class="results"></div>
<canvas id="chart" width="320" height="220"></canvas>

<h3>السجل</h3>
<div id="history"></div>

</div>

<div class="footer">
<p>إعداد الفرقة الثانية تصنيع غذائي</p>
<p>كلية الصناعة والطاقة - جامعة 6 أكتوبر التكنولوجية</p>
<p>تحت إشراف أ.د/ محمد عماد الدين</p>
</div>

<script>

// خلفية
bgInput.onchange=e=>{
let f=e.target.files[0];
if(f){let r=new FileReader();r.onload=()=>{
document.body.style.background=`url(${r.result}) center/cover`;
};r.readAsDataURL(f);}
};

function calc(){

let w=+document.getElementById('weight').value;
let h=+document.getElementById('height').value/100;
let a=+document.getElementById('age').value;
let g=document.getElementById('gender').value;
let act=+document.getElementById('activity').value;
let goal=document.getElementById('goal').value;
let name=document.getElementById('username').value || "مستخدم";

let bmi=w/(h*h);

let bmr = g==='male'
?(10*w)+(6.25*(h*100))-(5*a)+5
:(10*w)+(6.25*(h*100))-(5*a)-161;

let tdee=bmr*act;

if(goal==='lose') tdee-=500;
if(goal==='gain') tdee+=400;

let carbP=0.55;
let proteinP=0.22;
let fatP=1-(carbP+proteinP);

let carbs=(tdee*carbP)/4;
let protein=(tdee*proteinP)/4;
let fat=(tdee*fatP)/9;

let tips="";
if(bmi<18.5) tips="زود سعرات وبروتين";
else if(bmi<25) tips="حافظ على وزنك";
else if(bmi<30) tips="قلل كارب وسكر";
else tips="نظام غذائي ضروري";

let results=document.getElementById('results');
results.style.display='block';
results.innerHTML=`
<b>${name}</b><hr>
BMI: ${bmi.toFixed(2)}<br>
Calories: ${tdee.toFixed(0)} kcal<hr>
Protein: ${protein.toFixed(0)}g<br>
Carbs: ${carbs.toFixed(0)}g<br>
Fat: ${fat.toFixed(0)}g<hr>
<b>Tips:</b> ${tips}
`;

// Pie Chart
let c=document.getElementById('chart');
let ctx=c.getContext('2d');
ctx.clearRect(0,0,320,220);

let data=[protein,carbs,fat];
let colors=['#4caf50','#2196f3','#ff9800'];
let total=data.reduce((a,b)=>a+b,0);
let start=0;

for(let i=0;i<data.length;i++){
let slice=(data[i]/total)*Math.PI*2;
ctx.beginPath();
ctx.moveTo(160,110);
ctx.arc(160,110,80,start,start+slice);
ctx.fillStyle=colors[i];
ctx.fill();
start+=slice;
}

saveHistory(name,bmi,tdee);
}

function saveHistory(name,bmi,tdee){
let data=JSON.parse(localStorage.getItem('history')||'[]');
data.push({name,bmi,tdee,date:new Date().toLocaleString()});
localStorage.setItem('history',JSON.stringify(data));
loadHistory();
}

function loadHistory(){
let data=JSON.parse(localStorage.getItem('history')||'[]');
let box=document.getElementById('history');
box.innerHTML=data.slice(-5).map(x=>
`<div>${x.name} | BMI:${x.bmi.toFixed(1)} | ${x.date}</div>`
).join('');
}

function resetForm(){
weight.value='';height.value='';age.value='';
document.getElementById('results').style.display='none';
let ctx=document.getElementById('chart').getContext('2d');
ctx.clearRect(0,0,320,220);
}

function downloadPDF(){
let w=window.open('');
w.document.write('<h3>نتيجة الحساب</h3>'+document.getElementById('results').innerHTML);
w.print();
}

loadHistory();

</script>

</body>
</html>
